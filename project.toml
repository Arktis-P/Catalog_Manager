# Catalogue Manager project metadata
# This is a full product project, not a throwaway MVP.

name = "Catalogue Manager"
version = "0.1.0"
description = "Danbooru character image catalog manager with GUI desktop workflow"
gui = "react"
desktop_target = "browser-app-mode"  # future: electron or tauri

[paths]
backend = "backend"
frontend = "frontend"
venv = ".venv"
data = "data"
input = "input"
output = "output"

[runtime]
backend_port = 8000
frontend_port = 5173
app_url = "http://127.0.0.1:5173"

[python]
requirements = "backend/requirements.txt"

[node]
package_root = "frontend"
